
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=5.0,
user-scalable=yes">

<title>Drive Workspace</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg-base:#050505;
    --glass-bg:rgba(20,20,24,.65);
    --glass-border:rgba(255,255,255,.08);
    --glass-shadow:0 8px 32px rgba(0,0,0,.5);

    --text-main:#e2e2e6;
    --text-muted:#8b8b98;

    --btn-bg:rgba(255,255,255,.10);
    --btn-hover:rgba(255,255,255,.18);

    --accent-active:#fff;
    --accent-text:#000;

    --radius-large:24px;
    --radius-pill:50px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;

    background:#050505;

    background-image:
    radial-gradient(circle at 15% 50%, rgba(70,50,120,.15), transparent 40%),
    radial-gradient(circle at 85% 30%, rgba(50,90,120,.15), transparent 40%);

    color:var(--text-main);

    overflow:hidden;

    height:100dvh;
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:var(--btn-hover);
    border-radius:10px;
}

.glass-panel{
    background:var(--glass-bg);

    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);

    border:1px solid var(--glass-border);

    box-shadow:var(--glass-shadow);
}

/* =========================
   HEADER
========================= */

header{
    position:fixed;

    top:12px;
    left:12px;
    right:12px;

    height:58px;

    border-radius:var(--radius-pill);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 10px;

    z-index:1000;

    overflow:hidden;
}

.header-left,
.header-right{
    display:flex;
    align-items:center;

    gap:6px;

    min-width:0;
}

.header-right{
    margin-left:auto;
}

.sync-dot{
    width:8px;
    height:8px;

    border-radius:50%;

    background:#4ade80;

    box-shadow:0 0 10px #4ade80;

    opacity:0;

    flex-shrink:0;
}

.sync-dot.active{
    opacity:1;
}

button{
    flex-shrink:0;

    min-width:40px;
    width:40px;
    height:40px;

    padding:0;

    background:rgba(255,255,255,.16);

    border:1px solid rgba(255,255,255,.12);

    border-radius:var(--radius-pill);

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    transition:.25s ease;

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 4px 12px rgba(0,0,0,.35);
}

button:hover{
    background:rgba(255,255,255,.24);

    border-color:rgba(255,255,255,.2);

    box-shadow:
    0 0 18px rgba(255,255,255,.08),
    0 6px 16px rgba(0,0,0,.4);
}

button svg{
    width:18px;
    height:18px;
}

#upload-btn{
    background:rgba(255, 255, 255, 0.28);
}

#download-btn{
    background:rgba(255, 255, 255, 0.28);

    display:none;
}

#refresh-btn.loading svg{
    animation:spin 1s linear infinite;
}

.zoom-controls{
    display:flex;
    align-items:center;

    background:var(--btn-bg);

    border-radius:var(--radius-pill);

    padding:2px;

    flex-shrink:1;
}

.zoom-controls button{
    min-width:34px;
    width:34px;
    height:34px;

    background:none;
}

#zoom-display{
    min-width:38px;

    text-align:center;

    font-size:11px;

    color:var(--text-muted);
}

/* =========================
   SIDEBAR
========================= */

#sidebar{
    position:fixed;

    top:84px;
    left:-320px;

    width:280px;

    height:calc(100dvh - 96px);

    border-radius:var(--radius-large);

    overflow:hidden;

    display:flex;
    flex-direction:column;

    transition:left .35s;

    z-index:999;
}

#sidebar.open{
    left:12px;
}

.search-container{
    padding:18px;
    border-bottom:1px solid var(--glass-border);
}

#search-bar{
    width:100%;

    padding:12px 18px;

    border-radius:var(--radius-pill);

    border:1px solid var(--glass-border);

    background:var(--btn-bg);

    color:var(--text-main);

    outline:none;
}

.sidebar-scroll-area{
    overflow-y:auto;
    flex-grow:1;

    padding:10px;
}

.folder-group{
    margin-left:15px;

    border-left:1px solid var(--glass-border);

    padding-left:5px;

    display:none;
}

.folder-group.open{
    display:block;
}

.item-row{
    display:flex;
    align-items:center;

    padding:10px 12px;

    border-radius:10px;

    cursor:pointer;

    color:var(--text-muted);

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;

    user-select:none;
}

.item-row:hover{
    background:var(--btn-bg);

    color:var(--text-main);
}

.item-row.active{
    background:#fff;

    color:#000;
}

.arrow{
    width:12px;

    margin-right:6px;

    font-size:10px;
}

.folder-row.open .arrow{
    transform:rotate(90deg);
}

.icon{
    margin-right:8px;
}

.watermark{
    padding:15px;

    border-top:1px solid var(--glass-border);

    display:flex;
    justify-content:center;
}

.watermark img{
    width:220px;
}

/* =========================
   MAIN
========================= */

main{
    position:absolute;

    top:84px;
    bottom:12px;
    left:12px;
    right:12px;

    overflow:hidden;

    border-radius:var(--radius-large);

    background:#000;
}

#iframe-wrapper{
    width:100%;
    height:100%;

    transform-origin:top center;

    transition:transform .2s;
}

#file-viewer{
    width:100%;
    height:100%;

    border:none;

    display:none;

    background:#fff;
}

#placeholder{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    color:var(--text-muted);

    z-index:5;
}

/* =========================
   OVERLAY
========================= */

#overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.7);

    opacity:0;
    pointer-events:none;

    transition:.3s;

    z-index:998;
}

#overlay.active{
    opacity:1;
    pointer-events:all;
}

/* =========================
   MODALS
========================= */

#upload-modal,
#loading-overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.7);

    backdrop-filter:blur(4px);

    display:flex;
    align-items:center;
    justify-content:center;

    opacity:0;
    pointer-events:none;

    transition:.3s;

    z-index:2000;
}

#upload-modal.active,
#loading-overlay.active{
    opacity:1;
    pointer-events:all;
}

.modal-box{
    width:90%;
    max-width:450px;

    border-radius:var(--radius-large);

    padding:25px;

    display:flex;
    flex-direction:column;

    gap:15px;
}

.modal-folder-list{
    height:220px;

    overflow-y:auto;

    border:1px solid var(--glass-border);

    border-radius:10px;

    padding:10px;
}

.modal-folder{
    padding:10px;

    border-radius:8px;

    cursor:pointer;
}

.modal-folder:hover{
    background:var(--btn-bg);
}

.modal-actions{
    display:flex;

    gap:10px;
}

.modal-actions input{
    flex-grow:1;

    padding:10px;

    border-radius:10px;

    border:1px solid var(--glass-border);

    background:var(--btn-bg);

    color:#fff;
}

.breadcrumb{
    font-size:12px;

    color:var(--text-muted);

    display:flex;
    flex-wrap:wrap;

    gap:5px;
}

.breadcrumb span{
    color:#60a5fa;

    cursor:pointer;
}

.btn-primary{
    background:#fff;

    color:#000;
}

/* =========================
   LOADING
========================= */

.spinner{
    width:50px;
    height:50px;

    border:5px solid rgba(255,255,255,.1);
    border-top-color:#fff;

    border-radius:50%;

    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

/* =========================
   DESKTOP
========================= */

@media(min-width:768px){

    #sidebar{
        left:12px;
    }

    main{
        left:304px;
    }

    #menu-btn{
        display:none;
    }

    #overlay.active{
        opacity:0;
        pointer-events:none;
    }
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    header{
        padding:0 6px;
    }

    .header-left,
    .header-right{
        gap:4px;
    }

    button{
        min-width:36px;
        width:36px;
        height:36px;
    }

    button svg{
        width:16px;
        height:16px;
    }

    .zoom-controls{
        padding:1px;
    }

    .zoom-controls button{
        width:30px;
        height:30px;
        min-width:30px;
    }

    #zoom-display{
        min-width:32px;
        font-size:10px;
    }
}

</style>
</head>

<body>

<div id="loading-overlay">
    <div class="spinner"></div>
</div>

<div id="upload-modal">

    <div class="modal-box glass-panel">

        <div class="breadcrumb"
             id="modal-breadcrumb"></div>

        <div class="modal-folder-list"
             id="modal-folder-list"></div>

        <div class="modal-actions">

            <input type="text"
                   id="new-folder-name"
                   placeholder="New Folder Name...">

            <button id="create-folder-btn">

                <svg viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2">

                    <path d="M3 7h5l2 2h11v11a2 2 0 0 1-2 2H3z"/>

                </svg>

            </button>

        </div>

        <div class="modal-actions">

            <button id="cancel-upload-btn">
                Cancel
            </button>

            <button id="confirm-upload-btn"
                    class="btn-primary">

                <svg viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2">

                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>

                </svg>

            </button>

            <input type="file"
                   id="file-input"
                   style="display:none;">

        </div>

    </div>

</div>

<header class="glass-panel">

    <div class="header-left">

        <button id="menu-btn">

            <svg viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2">

                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>

            </svg>

        </button>

        <div class="sync-dot"
             id="sync-indicator"></div>

    </div>

    <div class="header-right">

        <div class="zoom-controls">

            <button id="zoom-out">-</button>

            <span id="zoom-display">
                100%
            </span>

            <button id="zoom-in">+</button>

        </div>

        <button id="refresh-btn">

            <svg viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2">

                <polyline points="23 4 23 10 17 10"/>
                <polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.13-3.36L23 10"/>
                <path d="M20.49 15a9 9 0 0 1-14.13 3.36L1 14"/>

            </svg>

        </button>

        <button id="download-btn">

            <svg viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2">

                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>

            </svg>

        </button>

        <button id="upload-btn">

            <svg viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2">

                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>

            </svg>

        </button>

        <button id="fullscreen-btn">

            <svg viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2">

                <polyline points="15 3 21 3 21 9"/>
                <polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/>
                <line x1="3" y1="21" x2="10" y2="14"/>

            </svg>

        </button>

    </div>

</header>

<div id="overlay"></div>

<nav id="sidebar"
     class="glass-panel">

<div class="search-container">

<input type="text"
       id="search-bar"
       placeholder="Search files...">

</div>

<div class="sidebar-scroll-area">

<div id="tree-container"></div>

<div id="search-results"></div>

</div>

<div class="watermark">

<img src="https://ik.imagekit.io/22h7wv5o2/b___Ultra_Detailed_Ima.png?updatedAt=1778874059723">

</div>

</nav>

<main class="glass-panel">

<div id="placeholder">

<svg width="48"
     height="48"
     viewBox="0 0 24 24"
     fill="none"
     stroke="currentColor"
     stroke-width="1">

<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>

<polyline points="14 2 14 8 20 8"/>

</svg>

<p style="margin-top:15px;">
Select a file from sidebar
</p>

</div>

<div id="iframe-wrapper">

<iframe id="file-viewer"></iframe>

</div>

</main>

<script>

/* KEEP YOUR EXISTING JS HERE */
const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycby05QXncqMlU_dWXsyvfaPpScFZCs3ysFxFPr3hYstV4_YlkE02vDt9nVqjQikL6IwyRg/exec";

const ROOT_FOLDER_ID =
"1ztsTJCXPBFzIYeOLSyZkZebjlTYyB1JK";

const CACHE_KEY =
"drive_tree_cache_v8";

let fullTreeData = [];
let allFlatFiles = [];
let currentZoom = 100;
let activeFileId = null;
let folderNavigationPath = [];

const sidebar =
document.getElementById('sidebar');

const overlay =
document.getElementById('overlay');

const treeContainer =
document.getElementById('tree-container');

const searchResults =
document.getElementById('search-results');

const fileViewer =
document.getElementById('file-viewer');

const iframeWrapper =
document.getElementById('iframe-wrapper');

const placeholder =
document.getElementById('placeholder');

const searchBar =
document.getElementById('search-bar');

const downloadBtn =
document.getElementById('download-btn');

const syncIndicator =
document.getElementById('sync-indicator');

const uploadModal =
document.getElementById('upload-modal');

function applyZoom(){

    iframeWrapper.style.transform =
    `scale(${currentZoom/100})`;

    document.getElementById('zoom-display')
    .textContent = `${currentZoom}%`;
}

document.getElementById('zoom-in')
.onclick = ()=>{

    currentZoom += 10;

    applyZoom();
};

document.getElementById('zoom-out')
.onclick = ()=>{

    if(currentZoom > 50){

        currentZoom -= 10;

        applyZoom();
    }
};

downloadBtn.onclick = ()=>{

    if(!activeFileId) return;

    const a =
    document.createElement('a');

    a.href =
    `https://drive.google.com/uc?export=download&id=${activeFileId}`;

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);
};

function getIcon(mimeType){

    if(mimeType.includes('pdf')) return '📄';

    if(mimeType.includes('image')) return '🖼️';

    if(mimeType.includes('video')) return '🎥';

    return '📄';
}

function renderTreeData(data){

    allFlatFiles = [];

    const frag =
    document.createDocumentFragment();

    buildTree(data, frag);

    treeContainer.innerHTML = '';

    treeContainer.appendChild(frag);
}

function buildTree(data, container){

    const ul =
    document.createElement('ul');

    data.forEach(item=>{

        if(item.type === 'folder'){

            const row =
            document.createElement('div');

            row.className =
            'item-row folder-row';

            row.innerHTML =
            `<span class="arrow">▶</span>
             <span class="icon">📁</span>
             ${item.name}`;

            const children =
            document.createElement('div');

            children.className =
            'folder-group';

            buildTree(item.children, children);

            row.onclick = ()=>{

                row.classList.toggle('open');

                children.classList.toggle('open');
            };

            ul.appendChild(row);
            ul.appendChild(children);

        } else {

            const row =
            document.createElement('div');

            row.className =
            'item-row';

            row.innerHTML =
            `<span class="arrow"></span>
             <span class="icon">${getIcon(item.mimeType)}</span>
             ${item.name}`;

            row.onclick =
            ()=>loadFile(item.id,row);

            ul.appendChild(row);

            allFlatFiles.push(item);
        }
    });

    container.appendChild(ul);
}

function loadFile(fileId, element){

    document.querySelectorAll('.item-row')
    .forEach(i=>i.classList.remove('active'));

    element.classList.add('active');

    activeFileId = fileId;

    downloadBtn.style.display = 'flex';

    placeholder.style.display = 'none';

    fileViewer.style.display = 'block';

    fileViewer.src =
    `https://drive.google.com/viewerng/viewer?embedded=true&url=https://drive.google.com/uc?id=${fileId}&export=download`;

    currentZoom = 100;

    applyZoom();

    if(window.innerWidth < 768){

        sidebar.classList.remove('open');

        overlay.classList.remove('active');
    }
}

async function strictRefresh(){

    const refreshBtn =
    document.getElementById('refresh-btn');

    refreshBtn.classList.add('loading');

    syncIndicator.classList.add('active');

    try{

        const res =
        await fetch(
            SCRIPT_URL + '?t=' + Date.now(),
            {
                cache:'no-store'
            }
        );

        const data =
        await res.json();

        localStorage.setItem(
            CACHE_KEY,
            JSON.stringify(data)
        );

        fullTreeData = data;

        renderTreeData(data);

    } catch(err){

        console.error(err);

    } finally {

        refreshBtn.classList.remove('loading');

        syncIndicator.classList.remove('active');
    }
}

async function initializeApp(){

    const cached =
    localStorage.getItem(CACHE_KEY);

    if(cached){

        fullTreeData =
        JSON.parse(cached);

        renderTreeData(fullTreeData);
    }

    await strictRefresh();
}

searchBar.addEventListener('input', e=>{

    const term =
    e.target.value.toLowerCase().trim();

    if(!term){

        treeContainer.style.display='block';

        searchResults.style.display='none';

        return;
    }

    treeContainer.style.display='none';

    searchResults.style.display='block';

    searchResults.innerHTML='';

    allFlatFiles
    .filter(f=>
        f.name.toLowerCase().includes(term)
    )
    .forEach(file=>{

        const row =
        document.createElement('div');

        row.className='item-row';

        row.innerHTML =
        `<span class="icon">${getIcon(file.mimeType)}</span>
         ${file.name}`;

        row.onclick =
        ()=>loadFile(file.id,row);

        searchResults.appendChild(row);
    });
});

document.getElementById('menu-btn')
.onclick = ()=>{

    sidebar.classList.add('open');

    overlay.classList.add('active');
};

overlay.onclick = ()=>{

    sidebar.classList.remove('open');

    overlay.classList.remove('active');
};

document.getElementById('fullscreen-btn')
.onclick = ()=>{

    if(!document.fullscreenElement){

        document.documentElement
        .requestFullscreen();

    } else {

        document.exitFullscreen();
    }
};

document.getElementById('refresh-btn')
.onclick = strictRefresh;

document.getElementById('upload-btn')
.onclick = ()=>{

    folderNavigationPath = [{
        id:ROOT_FOLDER_ID,
        name:"Home",
        children:fullTreeData
    }];

    renderModal();

    uploadModal.classList.add('active');
};

document.getElementById('cancel-upload-btn')
.onclick = ()=>{

    uploadModal.classList.remove('active');
};

function renderModal(){

    const current =
    folderNavigationPath[
        folderNavigationPath.length - 1
    ];

    const breadcrumb =
    document.getElementById(
        'modal-breadcrumb'
    );

    breadcrumb.innerHTML='';

    folderNavigationPath.forEach((node,index)=>{

        const span =
        document.createElement('span');

        span.textContent=node.name;

        span.onclick=()=>{

            folderNavigationPath =
            folderNavigationPath.slice(0,index+1);

            renderModal();
        };

        breadcrumb.appendChild(span);

        if(index <
           folderNavigationPath.length-1){

            breadcrumb.appendChild(
                document.createTextNode(' / ')
            );
        }
    });

    const list =
    document.getElementById(
        'modal-folder-list'
    );

    list.innerHTML='';

    current.children
    .filter(i=>i.type==='folder')
    .forEach(folder=>{

        const div =
        document.createElement('div');

        div.className='modal-folder';

        div.textContent =
        '📁 ' + folder.name;

        div.onclick=()=>{

            folderNavigationPath.push(folder);

            renderModal();
        };

        list.appendChild(div);
    });
}

document.getElementById('confirm-upload-btn')
.onclick = ()=>{

    document.getElementById('file-input')
    .click();
};

document.getElementById('file-input')
.addEventListener('change', e=>{

    const file = e.target.files[0];

    if(!file) return;

    uploadModal.classList.remove('active');

    document.getElementById('loading-overlay')
    .classList.add('active');

    const reader =
    new FileReader();

    reader.onload = async ev=>{

        try{

            await fetch(SCRIPT_URL,{

                method:'POST',

                body:JSON.stringify({

                    action:"upload",

                    parentId:
                    folderNavigationPath[
                        folderNavigationPath.length - 1
                    ].id,

                    filename:file.name,

                    mimeType:
                    file.type ||
                    'application/octet-stream',

                    base64:
                    ev.target.result.split(',')[1]
                })
            });

            await strictRefresh();

        } catch(err){

            console.error(err);

        } finally {

            document.getElementById(
                'loading-overlay'
            ).classList.remove('active');

            document.getElementById(
                'file-input'
            ).value='';
        }
    };

    reader.readAsDataURL(file);
});

initializeApp();
