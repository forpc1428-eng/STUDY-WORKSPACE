<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes</title>
    <style>
        :root {
            /* Light Theme */
            --bg-color: #f4f4f9;
            --text-color: #333333;
            --header-bg: #ffffff;
            --header-shadow: rgba(0, 0, 0, 0.1);
            --sidebar-bg: #ffffff;
            --sidebar-hover: #e0e0e0;
            --btn-bg: #eeeeee;
            --btn-hover: #dddddd;
            --error-color: #d9534f;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --header-bg: #1e1e1e;
            --header-shadow: rgba(0, 0, 0, 0.5);
            --sidebar-bg: #1e1e1e;
            --sidebar-hover: #333333;
            --btn-bg: #333333;
            --btn-hover: #444444;
            --error-color: #ff6666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Header / Navbar */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background-color: var(--header-bg);
            box-shadow: 0 2px 5px var(--header-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--text-color);
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        #menu-btn {
            font-size: 24px;
            background: none;
            padding: 5px;
        }

        /* Sidebar */
        #sidebar {
            position: fixed;
            top: 60px;
            left: -300px;
            width: 250px;
            height: calc(100vh - 60px);
            background-color: var(--sidebar-bg);
            box-shadow: 2px 0 5px var(--header-shadow);
            overflow-y: auto;
            transition: left 0.3s ease;
            z-index: 999;
            padding-top: 10px;
        }

        #sidebar.open {
            left: 0;
        }

        #file-list {
            list-style: none;
        }

        #file-list li {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--btn-bg);
            font-size: 16px;
        }

        #file-list li:hover {
            background-color: var(--sidebar-hover);
        }

        .error-msg {
            color: var(--error-color);
            padding: 15px 20px;
            font-size: 14px;
        }

        /* Overlay for mobile */
        #overlay {
            display: none;
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 998;
        }
        #overlay.active {
            display: block;
        }

        /* Main Content */
        main {
            margin-top: 60px;
            padding: 20px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        #content-area {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 100%; 
            line-height: 1.6;
            transition: font-size 0.2s ease;
        }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
            #sidebar { left: 0; }
            main { margin-left: 250px; max-width: calc(100% - 250px); padding: 40px; }
            #menu-btn { display: none; }
            #overlay.active { display: none; }
            body.sidebar-closed #sidebar { left: -250px; }
            body.sidebar-closed main { margin-left: auto; max-width: 900px; }
            body.sidebar-closed #menu-btn { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button id="menu-btn">☰</button>
            <h2 id="site-title">My Notes</h2>
        </div>
        <div class="header-right">
            <button id="zoom-out" title="Zoom Out">-</button>
            <button id="zoom-in" title="Zoom In">+</button>
            <button id="theme-toggle" title="Toggle Theme">🌓</button>
            <button id="fullscreen-btn" title="Reading Mode">⛶</button>
        </div>
    </header>

    <div id="overlay"></div>

    <nav id="sidebar">
        <ul id="file-list">
            <li>Loading files...</li>
        </ul>
    </nav>

    <main>
        <div id="content-area">Please select a note from the menu on the left.</div>
    </main>

    <script>
        // ==========================================
        // CONFIGURATION: JUST PASTE YOUR GITHUB LINK BELOW
        // ==========================================
        const REPO_LINK = "https://github.com/USERNAME/REPOSITORY_NAME";
        // ==========================================

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuBtn = document.getElementById('menu-btn');
        const fileList = document.getElementById('file-list');
        const contentArea = document.getElementById('content-area');
        const zoomInBtn = document.getElementById('zoom-in');
        const zoomOutBtn = document.getElementById('zoom-out');
        const themeToggleBtn = document.getElementById('theme-toggle');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        let currentZoom = 100;

        // --- Sidebar Logic ---
        function toggleSidebar() {
            if (window.innerWidth < 768) {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            } else {
                document.body.classList.toggle('sidebar-closed');
            }
        }

        menuBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        // --- Extract Username and Repo from Link ---
        function getRepoInfo() {
            try {
                // Remove trailing slash if exists, and split by '/'
                const cleanLink = REPO_LINK.replace(/\/$/, ''); 
                const parts = cleanLink.split('/');
                const repo = parts.pop();
                const username = parts.pop();
                return { username, repo };
            } catch (e) {
                return null;
            }
        }

        // --- Fetch Files from GitHub API ---
        async function fetchFileList() {
            const repoInfo = getRepoInfo();
            
            if (!repoInfo || !repoInfo.username || !repoInfo.repo || repoInfo.username === "USERNAME") {
                fileList.innerHTML = '<li class="error-msg">Error: Please paste your real GitHub repository link into the REPO_LINK variable in the code.</li>';
                return;
            }

            // By not specifying a branch, GitHub automatically uses your default branch (main/master)
            const apiUrl = `https://github.com/forpc1428-eng/STUDY-WORKSPACE`;
            
            try {
                const response = await fetch(apiUrl);
                
                if (response.status === 404) {
                    throw new Error("Repository not found. Is it set to Private? It must be Public.");
                } else if (!response.ok) {
                    throw new Error("GitHub API error. Check your repo link.");
                }
                
                const data = await response.json();
                
                // Filter only .txt files
                const txtFiles = data.filter(file => file.name.endsWith('.txt'));
                
                fileList.innerHTML = ''; // Clear loading text

                if (txtFiles.length === 0) {
                    fileList.innerHTML = '<li>No .txt files found in this repo.</li>';
                    return;
                }

                txtFiles.forEach(file => {
                    const li = document.createElement('li');
                    li.textContent = file.name.replace('.txt', ''); // Remove .txt for display
                    li.onclick = () => loadFile(file.download_url);
                    fileList.appendChild(li);
                });

            } catch (error) {
                console.error(error);
                fileList.innerHTML = `<li class="error-msg">${error.message}</li>`;
            }
        }

        // --- Load File Content ---
        async function loadFile(url) {
            contentArea.textContent = "Loading note...";
            if (window.innerWidth < 768) toggleSidebar(); // Close sidebar on mobile after clicking

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Failed to load text file.");
                const text = await response.text();
                contentArea.textContent = text;
            } catch (error) {
                contentArea.textContent = "Error loading note content.";
            }
        }

        // --- Zoom Logic (5% increments) ---
        zoomInBtn.addEventListener('click', () => {
            currentZoom += 5;
            contentArea.style.fontSize = `${currentZoom}%`;
        });

        zoomOutBtn.addEventListener('click', () => {
            if (currentZoom > 50) { 
                currentZoom -= 5;
                contentArea.style.fontSize = `${currentZoom}%`;
            }
        });

        // --- Theme Logic ---
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);

        themeToggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            let newTheme = theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // --- Fullscreen (Reading Mode) Logic ---
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        fetchFileList();
    </script>
</body>
</html>
