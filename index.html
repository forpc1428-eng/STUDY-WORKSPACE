<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"/>

<title>Drive Workspace</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet">

<style>

:root{
    --bg-base:#050505;
    --glass-bg:rgba(20,20,24,0.65);
    --glass-border:rgba(255,255,255,0.08);
    --glass-shadow:0 8px 32px rgba(0,0,0,0.5);

    --text-main:#e2e2e6;
    --text-muted:#8b8b98;

    --btn-bg:rgba(255,255,255,0.05);
    --btn-hover:rgba(255,255,255,0.1);

    --accent-glow:rgba(255,255,255,0.15);
    --accent-active:#ffffff;
    --accent-text:#000000;

    --radius-large:24px;
    --radius-pill:50px;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    transition:background-color .3s,color .3s;
}

body{
    font-family:'Inter',sans-serif;
    background-color:var(--bg-base);

    background-image:
        radial-gradient(circle at 15% 50%,
        rgba(70,50,120,.15),transparent 40%),

        radial-gradient(circle at 85% 30%,
        rgba(50,90,120,.15),transparent 40%);

    background-attachment:fixed;

    color:var(--text-main);

    overflow:hidden;

    height:100dvh;
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:var(--btn-hover);
    border-radius:10px;
}

.glass-panel{
    background:var(--glass-bg);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);

    border:1px solid var(--glass-border);

    box-shadow:var(--glass-shadow);
}

header{
    position:fixed;

    top:15px;
    left:15px;
    right:15px;

    height:60px;

    border-radius:var(--radius-pill);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 25px;

    z-index:1000;
}

#site-title{
    font-weight:500;
    font-size:1.1rem;

    display:flex;
    align-items:center;
    gap:10px;
}

.sync-dot{
    width:8px;
    height:8px;

    border-radius:50%;

    background:#4ade80;

    box-shadow:0 0 10px #4ade80;

    animation:pulse 1.5s infinite;

    opacity:0;

    transition:opacity .3s;
}

.sync-dot.active{
    opacity:1;
}

@keyframes pulse{
    0%{
        transform:scale(.95);
        opacity:.5;
    }

    50%{
        transform:scale(1.1);
        opacity:1;
    }

    100%{
        transform:scale(.95);
        opacity:.5;
    }
}

.header-left,
.header-right{
    display:flex;
    align-items:center;
    gap:8px;
}

button{
    background-color:var(--btn-bg);

    color:var(--text-main);

    border:1px solid transparent;

    padding:8px 16px;

    border-radius:var(--radius-pill);

    cursor:pointer;

    font-size:14px;
    font-weight:500;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:5px;

    white-space:nowrap;
}

button:hover{
    background-color:var(--btn-hover);

    border-color:var(--accent-glow);
}

#download-btn{
    background-color:rgba(46,139,87,.2);

    border-color:rgba(46,139,87,.5);

    display:none;
}

#download-btn:hover{
    background-color:rgba(46,139,87,.4);
}

.zoom-controls{
    display:flex;
    align-items:center;

    background-color:var(--btn-bg);

    border-radius:var(--radius-pill);

    padding:2px;
}

.zoom-controls button{
    background:none;
    padding:6px 12px;
}

#zoom-display{
    font-size:12px;
    font-weight:600;

    min-width:45px;

    text-align:center;

    color:var(--text-muted);
}

#sidebar{
    position:fixed;

    top:90px;
    left:-320px;

    width:280px;

    height:calc(100dvh - 105px);
    max-height:calc(100dvh - 105px);

    border-radius:var(--radius-large);

    overflow:hidden;

    display:flex;
    flex-direction:column;

    transition:left .4s cubic-bezier(.16,1,.3,1);

    z-index:999;
}

#sidebar.open{
    left:15px;
}

.sidebar-scroll-area{
    overflow-y:auto;
    flex-grow:1;
    min-height:0;
}

.search-container{
    padding:20px;

    border-bottom:1px solid var(--glass-border);
}

#search-bar{
    width:100%;

    padding:12px 20px;

    border-radius:var(--radius-pill);

    border:1px solid var(--glass-border);

    background-color:var(--btn-bg);

    color:var(--text-main);

    font-size:14px;

    outline:none;
}

ul{
    list-style:none;
}

.folder-group{
    margin-left:15px;

    display:none;

    border-left:1px solid var(--glass-border);

    padding-left:5px;
}

.folder-group.open{
    display:block;
}

.item-row{
    padding:10px 12px;

    cursor:pointer;

    border-radius:10px;

    margin-bottom:2px;

    font-size:14px;

    color:var(--text-muted);

    display:flex;
    align-items:center;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;

    user-select:none;
}

.item-row:hover{
    background-color:var(--btn-bg);

    color:var(--text-main);
}

.item-row.active{
    background-color:var(--accent-active);

    color:var(--accent-text);

    font-weight:500;
}

.icon{
    margin-right:8px;
    font-size:16px;
}

.arrow{
    font-size:10px;

    margin-right:6px;

    transition:transform .2s;

    width:12px;

    text-align:center;
}

.folder-row.open .arrow{
    transform:rotate(90deg);
}

.watermark{
    padding:15px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-top:1px solid var(--glass-border);

    user-select:none;
    pointer-events:none;
}

.watermark img{
    width:220px;

    opacity:.9;
}

#overlay{
    opacity:0;
    pointer-events:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.7);

    z-index:998;

    backdrop-filter:blur(4px);

    transition:opacity .3s;
}

#overlay.active{
    opacity:1;
    pointer-events:all;
}

main{
    position:absolute;

    top:90px;
    bottom:15px;
    right:15px;
    left:15px;

    overflow:hidden;

    border-radius:var(--radius-large);

    background:var(--bg-base);

    transition:left .4s cubic-bezier(.16,1,.3,1);
}

#placeholder{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    text-align:center;

    color:var(--text-muted);

    background:var(--bg-base);
}

#placeholder p{
    margin-top:15px;
}

#iframe-wrapper{
    width:100%;
    height:100%;

    transition:transform .25s ease-out;

    transform-origin:top center;

    background:white;
}

#file-viewer{
    width:100%;
    height:100%;

    border:none;

    display:none;

    background:white;
}

@media (min-width:768px){

    #sidebar{
        left:15px;
    }

    main{
        left:310px;
    }

    #menu-btn{
        display:none;
    }

    #overlay.active{
        opacity:0;
        pointer-events:none;
    }

}

@media (max-width:768px){

    header{
        padding:0 10px;
    }

    #site-title{
        display:none;
    }

    button{
        padding:6px 10px;
        font-size:16px;
    }

}

</style>
</head>

<body>

<header class="glass-panel">

<div class="header-left">

<button id="menu-btn">☰</button>

<h2 id="site-title">
Workspace
<div class="sync-dot" id="sync-indicator"></div>
</h2>

</div>

<div class="header-right">

<!-- REFRESH BUTTON -->
<button id="refresh-btn" title="Refresh">

<svg width="18"
     height="18"
     viewBox="0 0 24 24"
     fill="none"
     stroke="currentColor"
     stroke-width="2"
     stroke-linecap="round"
     stroke-linejoin="round">

<polyline points="23 4 23 10 17 10"></polyline>
<polyline points="1 20 1 14 7 14"></polyline>

<path d="M3.51 9a9 9 0 0 1 14.13-3.36L23 10"></path>
<path d="M20.49 15a9 9 0 0 1-14.13 3.36L1 14"></path>

</svg>

</button>

<div class="zoom-controls">

<button id="zoom-out">-</button>

<span id="zoom-display">100%</span>

<button id="zoom-in">+</button>

</div>

<button id="download-btn" title="Download">

<svg width="18"
     height="18"
     viewBox="0 0 24 24"
     fill="none"
     stroke="currentColor"
     stroke-width="2"
     stroke-linecap="round"
     stroke-linejoin="round">

<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>

<polyline points="7 10 12 15 17 10"/>

<line x1="12" y1="15" x2="12" y2="3"/>

</svg>

</button>

<button id="fullscreen-btn">⛶</button>

</div>

</header>

<div id="overlay"></div>

<nav id="sidebar" class="glass-panel">

<div class="search-container">

<input type="text"
       id="search-bar"
       placeholder="Search files...">

</div>

<div class="sidebar-scroll-area">

<div id="tree-container"></div>

</div>

<div class="watermark">

<img src="https://ik.imagekit.io/22h7wv5o2/b___Ultra_Detailed_Ima.png?updatedAt=1778874059723">

</div>

</nav>

<main class="glass-panel">

<div id="placeholder">

<svg width="48"
     height="48"
     viewBox="0 0 24 24"
     fill="none"
     stroke="currentColor"
     stroke-width="1">

<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>

<polyline points="14 2 14 8 20 8"></polyline>

</svg>

<p>Select a file from sidebar</p>

</div>

<div id="iframe-wrapper">

<iframe id="file-viewer"></iframe>

</div>

</main>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxT49Fn2pnZcp-msuVIO0k-tIJKx54btZGo8yRmC1d3i4hYHRlB8j2O0lsn0WulHESOag/exec";

const CACHE_KEY = "drive_tree_cache_v6";

let fullTreeData = [];

let currentZoom = 100;

let activeFileId = null;

const sidebar = document.getElementById('sidebar');

const overlay = document.getElementById('overlay');

const treeContainer = document.getElementById('tree-container');

const syncIndicator =
document.getElementById('sync-indicator');

const fileViewer =
document.getElementById('file-viewer');

const iframeWrapper =
document.getElementById('iframe-wrapper');

const placeholder =
document.getElementById('placeholder');

const downloadBtn =
document.getElementById('download-btn');

function applyZoom(){

    iframeWrapper.style.transform =
    `scale(${currentZoom / 100})`;

    document.getElementById('zoom-display')
    .textContent = `${currentZoom}%`;

}

document.getElementById('zoom-in').onclick = () => {

    currentZoom += 10;

    applyZoom();

};

document.getElementById('zoom-out').onclick = () => {

    if(currentZoom > 50){

        currentZoom -= 10;

        applyZoom();

    }

};

function getIcon(mime){

    if(mime.includes('pdf')) return '📄';

    if(mime.includes('image')) return '🖼️';

    if(mime.includes('video')) return '🎥';

    return '📄';

}

function loadFile(fileId, element){

    document.querySelectorAll('.item-row')
    .forEach(i => i.classList.remove('active'));

    element.classList.add('active');

    activeFileId = fileId;

    downloadBtn.style.display = 'flex';

    placeholder.style.display = 'none';

    fileViewer.style.display = 'block';

    fileViewer.src =
    `https://drive.google.com/viewerng/viewer?embedded=true&url=https://drive.google.com/uc?id=${fileId}&export=download&t=${Date.now()}`;

    currentZoom = 100;

    applyZoom();

    if(window.innerWidth < 768){

        sidebar.classList.remove('open');

        overlay.classList.remove('active');

    }

}

function buildTree(data, container){

    const ul = document.createElement('ul');

    data.forEach(item => {

        if(item.type === 'folder'){

            const folderRow =
            document.createElement('div');

            folderRow.className =
            'item-row folder-row';

            folderRow.innerHTML =
            `<span class="arrow">▶</span>
             <span class="icon">📁</span>
             ${item.name}`;

            const childrenContainer =
            document.createElement('div');

            childrenContainer.className =
            'folder-group';

            buildTree(
                item.children,
                childrenContainer
            );

            folderRow.onclick = () => {

                folderRow.classList.toggle('open');

                childrenContainer.classList.toggle('open');

            };

            ul.appendChild(folderRow);

            ul.appendChild(childrenContainer);

        } else {

            const fileRow =
            document.createElement('div');

            fileRow.className = 'item-row';

            fileRow.innerHTML =
            `<span class="icon">
            ${getIcon(item.mimeType)}
            </span>
            ${item.name}`;

            fileRow.onclick = () =>
            loadFile(item.id, fileRow);

            ul.appendChild(fileRow);

        }

    });

    container.appendChild(ul);

}

function renderTreeData(data){

    treeContainer.innerHTML = '';

    const fragment =
    document.createDocumentFragment();

    buildTree(data, fragment);

    treeContainer.appendChild(fragment);

}

async function initializeApp(){

    const cached =
    localStorage.getItem(CACHE_KEY);

    if(cached){

        fullTreeData = JSON.parse(cached);

        renderTreeData(fullTreeData);

    }

    syncIndicator.classList.add('active');

    try{

        const response =
        await fetch(SCRIPT_URL);

        const newData =
        await response.json();

        fullTreeData = newData;

        localStorage.setItem(
            CACHE_KEY,
            JSON.stringify(newData)
        );

        renderTreeData(fullTreeData);

    } catch(e){

        console.warn("Sync failed");

    } finally {

        syncIndicator.classList.remove('active');

    }

}

document.getElementById('refresh-btn')
.addEventListener('click', async () => {

    const refreshBtn =
    document.getElementById('refresh-btn');

    refreshBtn.style.opacity = ".6";

    refreshBtn.style.pointerEvents = "none";

    syncIndicator.classList.add('active');

    try{

        localStorage.removeItem(CACHE_KEY);

        const response =
        await fetch(
            SCRIPT_URL + "?t=" + Date.now()
        );

        const newData =
        await response.json();

        fullTreeData = newData;

        localStorage.setItem(
            CACHE_KEY,
            JSON.stringify(newData)
        );

        renderTreeData(fullTreeData);

        if(activeFileId){

            fileViewer.src =
            `https://drive.google.com/viewerng/viewer?embedded=true&url=https://drive.google.com/uc?id=${activeFileId}&export=download&t=${Date.now()}`;

        }

    } catch(e){

        console.warn("Refresh failed");

    } finally {

        syncIndicator.classList.remove('active');

        refreshBtn.style.opacity = "1";

        refreshBtn.style.pointerEvents = "all";

    }

});

/* ULTRA DIRECT DOWNLOAD */
downloadBtn.addEventListener('click', async () => {

    if(!activeFileId) return;

    try {

        syncIndicator.classList.add('active');

        const response = await fetch(
            `https://drive.google.com/uc?export=download&id=${activeFileId}`
        );

        const blob = await response.blob();

        let filename = "download";

        const disposition =
        response.headers.get('content-disposition');

        if(
            disposition &&
            disposition.includes('filename=')
        ){

            filename =
            disposition
            .split('filename=')[1]
            .replace(/"/g,'');

        }

        const blobUrl =
        window.URL.createObjectURL(blob);

        const a =
        document.createElement('a');

        a.href = blobUrl;

        a.download = filename;

        document.body.appendChild(a);

        a.click();

        a.remove();

        setTimeout(() => {

            window.URL.revokeObjectURL(blobUrl);

        }, 1000);

    } catch(err){

        console.error("Download failed", err);

        alert("Download failed");

    } finally {

        syncIndicator.classList.remove('active');

    }

});

document.getElementById('menu-btn')
.addEventListener('click', () => {

    sidebar.classList.add('open');

    overlay.classList.add('active');

});

overlay.addEventListener('click', () => {

    sidebar.classList.remove('open');

    overlay.classList.remove('active');

});

document.getElementById('fullscreen-btn')
.addEventListener('click', () => {

    if(!document.fullscreenElement){

        document.documentElement
        .requestFullscreen()
        .catch(()=>{});

    } else {

        document.exitFullscreen();

    }

});

initializeApp();

</script>

</body>
</html>
