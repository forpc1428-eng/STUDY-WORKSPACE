<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Study Notes</title>
    <style>
        :root {
            /* Light Theme */
            --bg-color: #f4f4f9;
            --text-color: #333333;
            --header-bg: #ffffff;
            --header-shadow: rgba(0, 0, 0, 0.1);
            --sidebar-bg: #ffffff;
            --sidebar-hover: #e0e0e0;
            --btn-bg: #eeeeee;
            --btn-hover: #dddddd;
            --error-color: #d9534f;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --header-bg: #1e1e1e;
            --header-shadow: rgba(0, 0, 0, 0.5);
            --sidebar-bg: #1e1e1e;
            --sidebar-hover: #333333;
            --btn-bg: #333333;
            --btn-hover: #444444;
            --error-color: #ff6666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Smooth color transitions */
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        html {
            /* Smooth scrolling for the whole page */
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Header / Navbar */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background-color: var(--header-bg);
            box-shadow: 0 2px 5px var(--header-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--text-color);
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: var(--btn-hover);
        }
        
        button:active {
            transform: scale(0.95);
        }

        #menu-btn {
            font-size: 24px;
            background: none;
            padding: 5px;
        }

        /* Sidebar */
        #sidebar {
            position: fixed;
            top: 60px;
            left: -300px;
            width: 250px;
            height: calc(100vh - 60px);
            background-color: var(--sidebar-bg);
            box-shadow: 2px 0 5px var(--header-shadow);
            overflow-y: auto;
            /* Smooth sliding and scrolling */
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            scroll-behavior: smooth;
            z-index: 999;
            padding-top: 10px;
        }

        /* Custom Scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--btn-bg); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--btn-hover); }

        #sidebar.open {
            left: 0;
        }

        #file-list {
            list-style: none;
        }

        #file-list li {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--btn-bg);
            font-size: 16px;
            transition: background-color 0.2s ease, padding-left 0.2s ease;
        }

        #file-list li:hover {
            background-color: var(--sidebar-hover);
            padding-left: 25px; /* Slight indent on hover for smoothness */
        }

        .error-msg {
            color: var(--error-color);
            padding: 15px 20px;
            font-size: 14px;
        }

        /* Overlay for mobile */
        #overlay {
            opacity: 0;
            pointer-events: none;
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 998;
            transition: opacity 0.3s ease;
        }
        #overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Main Content */
        main {
            margin-top: 60px;
            padding: 20px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1), max-width 0.3s ease;
        }

        #content-area {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 100%; 
            line-height: 1.8; /* Slightly higher line-height for better readability */
            transition: font-size 0.2s ease;
        }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
            #sidebar { left: 0; }
            main { margin-left: 250px; max-width: calc(100% - 250px); padding: 40px; }
            #menu-btn { display: none; }
            #overlay.active { opacity: 0; pointer-events: none; }
            body.sidebar-closed #sidebar { left: -250px; }
            body.sidebar-closed main { margin-left: auto; max-width: 900px; }
            body.sidebar-closed #menu-btn { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button id="menu-btn">☰</button>
            <h2 id="site-title">My Study Notes</h2>
        </div>
        <div class="header-right">
            <button id="zoom-out" title="Zoom Out">-</button>
            <button id="zoom-in" title="Zoom In">+</button>
            <button id="theme-toggle" title="Toggle Theme">🌓</button>
            <button id="fullscreen-btn" title="Reading Mode">⛶</button>
        </div>
    </header>

    <div id="overlay"></div>

    <nav id="sidebar">
        <ul id="file-list">
            <li>Loading menu...</li>
        </ul>
    </nav>

    <main>
        <div id="content-area">Please select a note from the menu on the left.</div>
    </main>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const REPO_LINK = "https://github.com/forpc1428-eng/STUDY-WORKSPACE";
        const CACHE_PREFIX = "study_notes_"; // Prefix for browser saving
        // ==========================================

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuBtn = document.getElementById('menu-btn');
        const fileList = document.getElementById('file-list');
        const contentArea = document.getElementById('content-area');
        const zoomInBtn = document.getElementById('zoom-in');
        const zoomOutBtn = document.getElementById('zoom-out');
        const themeToggleBtn = document.getElementById('theme-toggle');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        let currentZoom = 100;

        // --- Sidebar Logic ---
        function toggleSidebar() {
            if (window.innerWidth < 768) {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            } else {
                document.body.classList.toggle('sidebar-closed');
            }
        }

        menuBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        // --- Extract Username and Repo from Link ---
        function getRepoInfo() {
            try {
                const cleanLink = REPO_LINK.replace(/\/$/, ''); 
                const parts = cleanLink.split('/');
                const repo = parts.pop();
                const username = parts.pop();
                return { username, repo };
            } catch (e) {
                return null;
            }
        }

        // --- Render the Sidebar Menu ---
        function renderMenu(files) {
            fileList.innerHTML = '';
            if (files.length === 0) {
                fileList.innerHTML = '<li>No .txt files found.</li>';
                return;
            }
            files.forEach(file => {
                const li = document.createElement('li');
                li.textContent = file.name.replace('.txt', ''); 
                li.onclick = () => loadFile(file); // Pass the whole file object
                fileList.appendChild(li);
            });
        }

        // --- Fetch Files List (With Caching) ---
        async function fetchFileList() {
            const repoInfo = getRepoInfo();
            if (!repoInfo) return;

            // 1. Instantly load the menu from browser memory (if it exists)
            const cachedMenu = localStorage.getItem(CACHE_PREFIX + 'menu');
            if (cachedMenu) {
                renderMenu(JSON.parse(cachedMenu));
            }

            // 2. Fetch from GitHub in the background to see if you added new files
            const apiUrl = `https://api.github.com/repos/${repoInfo.username}/${repoInfo.repo}/contents/`;
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("API error");
                
                const data = await response.json();
                const txtFiles = data.filter(file => file.name.endsWith('.txt'));
                
                // 3. If the GitHub files are different from the saved ones, update the screen and memory
                if (JSON.stringify(txtFiles) !== cachedMenu) {
                    localStorage.setItem(CACHE_PREFIX + 'menu', JSON.stringify(txtFiles));
                    renderMenu(txtFiles);
                }
            } catch (error) {
                if (!cachedMenu) fileList.innerHTML = `<li class="error-msg">Failed to load menu. Are you offline?</li>`;
            }
        }

        // --- Load File Content (Zero Delay + Background Updating) ---
        async function loadFile(file) {
            if (window.innerWidth < 768) toggleSidebar(); // Smoothly close mobile sidebar
            window.scrollTo({ top: 0, behavior: 'smooth' }); // Scroll to top smoothly

            const cacheKey = CACHE_PREFIX + 'file_' + file.name;
            const cachedText = localStorage.getItem(cacheKey);

            // 1. Instantly show saved text from browser memory
            if (cachedText) {
                contentArea.textContent = cachedText;
            } else {
                contentArea.textContent = "Fetching note securely...";
            }

            // 2. Silently fetch the newest version from GitHub in the background
            try {
                // We add ?t=... to force GitHub to bypass its own cache and give us the absolute newest version
                const response = await fetch(file.download_url + '?t=' + new Date().getTime());
                if (!response.ok) throw new Error("Failed to load");
                
                const latestText = await response.text();
                
                // 3. Update the screen ONLY if you edited the text file on GitHub since last viewing
                if (latestText !== cachedText) {
                    contentArea.textContent = latestText;
                    localStorage.setItem(cacheKey, latestText); // Save new version to memory
                }
            } catch (error) {
                if (!cachedText) contentArea.textContent = "Error loading note. Please check your connection.";
            }
        }

        // --- Zoom Logic (5% increments) ---
        zoomInBtn.addEventListener('click', () => {
            currentZoom += 5;
            contentArea.style.fontSize = `${currentZoom}%`;
        });

        zoomOutBtn.addEventListener('click', () => {
            if (currentZoom > 50) { 
                currentZoom -= 5;
                contentArea.style.fontSize = `${currentZoom}%`;
            }
        });

        // --- Theme Logic (Saves to memory) ---
        const currentTheme = localStorage.getItem(CACHE_PREFIX + 'theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);

        themeToggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            let newTheme = theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem(CACHE_PREFIX + 'theme', newTheme);
        });

        // --- Fullscreen (Reading Mode) Logic ---
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize App
        fetchFileList();
    </script>
</body>
</html>
