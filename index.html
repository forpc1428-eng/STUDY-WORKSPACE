<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Drive Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #050505; --glass-bg: rgba(20, 20, 24, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08); --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --text-main: #e2e2e6; --text-muted: #8b8b98; 
            --btn-bg: rgba(255, 255, 255, 0.05); --btn-hover: rgba(255, 255, 255, 0.1);
            --accent-glow: rgba(255, 255, 255, 0.15); --accent-active: #ffffff; --accent-text: #000000;
            --radius-large: 24px; --radius-pill: 50px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-base); background-image: radial-gradient(circle at 15% 50%, rgba(70, 50, 120, 0.15), transparent 40%), radial-gradient(circle at 85% 30%, rgba(50, 90, 120, 0.15), transparent 40%); background-attachment: fixed; color: var(--text-main); overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: var(--btn-hover); border-radius: 10px; }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); }

        header { position: fixed; top: 15px; left: 15px; right: 15px; height: 60px; border-radius: var(--radius-pill); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 1000; }
        #site-title { font-weight: 500; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 10px #4ade80; animation: pulse 1.5s infinite; opacity: 0; transition: opacity 0.3s; }
        .sync-dot.active { opacity: 1; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.5; } }

        .header-left, .header-right { display: flex; align-items: center; gap: 8px; }

        button { background-color: var(--btn-bg); color: var(--text-main); border: 1px solid transparent; padding: 8px 16px; border-radius: var(--radius-pill); cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 5px; white-space: nowrap;}
        button:hover { background-color: var(--btn-hover); border-color: var(--accent-glow); }
        
        #upload-btn { background-color: rgba(70, 130, 180, 0.2); border-color: rgba(70, 130, 180, 0.5); }
        #upload-btn:hover { background-color: rgba(70, 130, 180, 0.4); }
        
        #download-btn { background-color: rgba(46, 139, 87, 0.2); border-color: rgba(46, 139, 87, 0.5); display: none; }
        #download-btn:hover { background-color: rgba(46, 139, 87, 0.4); }

        .zoom-controls { display: flex; align-items: center; background-color: var(--btn-bg); border-radius: var(--radius-pill); padding: 2px; }
        .zoom-controls button { background: none; padding: 6px 12px; }
        #zoom-display { font-size: 12px; font-weight: 600; min-width: 45px; text-align: center; color: var(--text-muted); }

        #sidebar { position: fixed; top: 90px; left: -320px; width: 280px; height: calc(100vh - 105px); border-radius: var(--radius-large); overflow: hidden; display: flex; flex-direction: column; transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 999; }
        #sidebar.open { left: 15px; }

        .search-container { padding: 20px; border-bottom: 1px solid var(--glass-border); }
        #search-bar { width: 100%; padding: 12px 20px; border-radius: var(--radius-pill); border: 1px solid var(--glass-border); background-color: var(--btn-bg); color: var(--text-main); font-size: 14px; outline: none; }

        .sidebar-scroll-area { overflow-y: auto; flex-grow: 1; padding: 10px 10px 10px 5px; }
        ul { list-style: none; }
        .folder-group { margin-left: 15px; display: none; border-left: 1px solid var(--glass-border); padding-left: 5px;}
        .folder-group.open { display: block; }
        
        .item-row { padding: 10px 12px; cursor: pointer; border-radius: 10px; margin-bottom: 2px; font-size: 14px; color: var(--text-muted); display: flex; align-items: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none; }
        .item-row:hover { background-color: var(--btn-bg); color: var(--text-main); }
        .item-row.active { background-color: var(--accent-active); color: var(--accent-text); font-weight: 500; }
        .icon { margin-right: 8px; font-size: 16px; }
        .arrow { font-size: 10px; margin-right: 6px; transition: transform 0.2s; width: 12px; text-align: center; }
        .folder-row.open .arrow { transform: rotate(90deg); }

        #search-results { display: none; } #search-results .item-row { margin-left: 0; }
        .skeleton { height: 35px; border-radius: 10px; margin-bottom: 5px; background: linear-gradient(90deg, var(--btn-bg) 25%, var(--btn-hover) 50%, var(--btn-bg) 75%); background-size: 200% 100%; animation: loadingSkeleton 1.5s infinite; }
        @keyframes loadingSkeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* FIXED IMAGE LOGO WATERMARK */
        .watermark { padding: 15px; display: flex; justify-content: center; align-items: center; border-top: 1px solid var(--glass-border); user-select: none; pointer-events: none; }
        .watermark img { width: 220px; height: auto; opacity: 0.9; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); transition: transform 0.3s; }

        #overlay, #upload-modal, #loading-overlay { opacity: 0; pointer-events: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 998; backdrop-filter: blur(4px); transition: opacity 0.3s; }
        #overlay.active, #upload-modal.active, #loading-overlay.active { opacity: 1; pointer-events: all; }

        #upload-modal { display: flex; align-items: center; justify-content: center; z-index: 1001; }
        .modal-box { width: 90%; max-width: 450px; border-radius: var(--radius-large); padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .modal-header { font-size: 1.2rem; font-weight: 500; color: var(--text-main); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        .breadcrumb { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; display: flex; gap: 5px; align-items: center; }
        .breadcrumb span { cursor: pointer; color: #60a5fa; }
        .breadcrumb span:hover { text-decoration: underline; }
        .modal-folder-list { background: rgba(0,0,0,0.2); border-radius: 10px; height: 200px; overflow-y: auto; padding: 10px; border: 1px solid var(--glass-border); }
        .modal-folder { padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .modal-folder:hover { background: var(--btn-bg); }
        .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .modal-actions input { flex-grow: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border); background: var(--btn-bg); color: var(--text-main); outline: none; }
        .btn-primary { background: var(--accent-active); color: var(--accent-text); }
        
        #loading-overlay { z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--glass-border); border-top-color: var(--text-main); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        main { position: absolute; top: 90px; bottom: 15px; right: 15px; left: 15px; transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden; border-radius: var(--radius-large); background: var(--bg-base);}
        
        /* SIMPLE & CLEAN WELCOME SCREEN */
        #placeholder { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
            color: var(--text-muted); z-index: 5;
            background: var(--bg-base);
        }
        #placeholder p { font-size: 1rem; margin-top: 15px; font-weight: 400; }

        #iframe-wrapper { width: 100%; height: 100%; transition: transform 0.25s ease-out; transform-origin: top center; background: white;}
        #file-viewer { width: 100%; height: 100%; border: none; z-index: 2; display: none; background: white; }

        @media (min-width: 768px) { #sidebar { left: 15px; } main { left: 310px; } #menu-btn { display: none; } #overlay.active { opacity: 0; pointer-events: none; } }
        
        /* FIX FOR MOBILE OVERFLOW - HIDES TEXT, KEEPS ICONS */
        @media (max-width: 768px) { 
            header { padding: 0 10px; }
            #site-title { display: none; } 
            .btn-text { display: none; } /* Hides words like "Upload" and "Download" */
            button { padding: 6px 10px; font-size: 16px; } 
            .zoom-controls button { padding: 6px 10px; } 
            #zoom-display { min-width: 38px; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <h2 id="loading-status" style="font-weight: 400;">Processing...</h2>
    </div>

    <div id="upload-modal">
        <div class="modal-box glass-panel">
            <div class="modal-header">Select Destination</div>
            <div class="breadcrumb" id="modal-breadcrumb"></div>
            <div class="modal-folder-list" id="modal-folder-list"></div>
            <div class="modal-actions" style="margin-top: 5px;">
                <input type="text" id="new-folder-name" placeholder="New Folder Name...">
                <button id="create-folder-btn" title="Create folder here">📁 <span class="btn-text">Create</span></button>
            </div>
            <div class="modal-actions" style="border-top: 1px solid var(--glass-border); padding-top: 15px; margin-top: 5px;">
                <button id="cancel-upload-btn" style="flex:1;">Cancel</button>
                <button id="confirm-upload-btn" class="btn-primary" style="flex:2;">⬆️ <span class="btn-text">Upload Here</span></button>
                <input type="file" id="file-input" style="display: none;">
            </div>
        </div>
    </div>

    <header class="glass-panel">
        <div class="header-left">
            <button id="menu-btn">☰</button>
            <h2 id="site-title">Workspace <div class="sync-dot" id="sync-indicator" title="Syncing..."></div></h2>
        </div>
        <div class="header-right">
            <div class="zoom-controls">
                <button id="zoom-out" title="Zoom Out">-</button>
                <span id="zoom-display">100%</span>
                <button id="zoom-in" title="Zoom In">+</button>
            </div>
            <button id="download-btn" title="Download Current File">⬇️ <span class="btn-text">Download</span></button>
            <button id="upload-btn" title="Upload a File">⬆️ <span class="btn-text">Upload</span></button>
            <button id="fullscreen-btn" title="Fullscreen">⛶</button>
        </div>
    </header>

    <div id="overlay"></div>

    <nav id="sidebar" class="glass-panel">
        <div class="search-container"><input type="text" id="search-bar" placeholder="Search files..."></div>
        <div class="sidebar-scroll-area">
            <div id="skeleton-loader" style="display: none;">
                <div class="skeleton"></div><div class="skeleton" style="width: 80%"></div><div class="skeleton" style="width: 90%"></div>
            </div>
            <div id="tree-container"></div>
            <div id="search-results"></div>
        </div>

        <!-- The Image Logo -->
        <div class="watermark">
            <img src="https://ik.imagekit.io/22h7wv5o2/b___Ultra_Detailed_Ima.png?updatedAt=1778874059723" alt="Workspace Logo">
        </div>
    </nav>

    <main class="glass-panel">
        <!-- SIMPLE WELCOME SCREEN -->
        <div id="placeholder">
            <!-- Minimalist Document SVG Icon -->
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <p>Select a file to preview</p>
        </div>

        <div id="iframe-wrapper">
            <iframe id="file-viewer" src=""></iframe>
        </div>
    </main>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxT49Fn2pnZcp-msuVIO0k-tIJKx54btZGo8yRmC1d3i4hYHRlB8j2O0lsn0WulHESOag/exec"; 
        const ROOT_FOLDER_ID = "1ztsTJCXPBFzIYeOLSyZkZebjlTYyB1JK";
        const CACHE_KEY = "drive_tree_cache_v6";
        // ==========================================

        let fullTreeData = [];
        let allFlatFiles = []; 
        let folderNavigationPath = []; 
        let currentZoom = 100;
        let activeFileId = null; 

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const treeContainer = document.getElementById('tree-container');
        const searchResults = document.getElementById('search-results');
        const skeletonLoader = document.getElementById('skeleton-loader');
        const syncIndicator = document.getElementById('sync-indicator');
        const fileViewer = document.getElementById('file-viewer');
        const iframeWrapper = document.getElementById('iframe-wrapper');
        const placeholder = document.getElementById('placeholder');
        const searchBar = document.getElementById('search-bar');
        const downloadBtn = document.getElementById('download-btn');
        
        // --- ZOOM LOGIC ---
        function applyZoom() {
            iframeWrapper.style.transform = `scale(${currentZoom / 100})`;
            document.getElementById('zoom-display').textContent = `${currentZoom}%`;
        }
        document.getElementById('zoom-in').addEventListener('click', () => { currentZoom += 10; applyZoom(); });
        document.getElementById('zoom-out').addEventListener('click', () => { if (currentZoom > 50) { currentZoom -= 10; applyZoom(); }});

        // --- DOWNLOAD LOGIC ---
        downloadBtn.addEventListener('click', () => {
            if (!activeFileId) return;
            const downloadUrl = `https://drive.google.com/uc?export=download&id=${activeFileId}`;
            const link = document.createElement('a');
            link.href = downloadUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        function getIcon(mimeType) {
            if (mimeType.includes('pdf')) return '📄';
            if (mimeType.includes('image')) return '🖼️';
            if (mimeType.includes('video')) return '🎥';
            return '📄';
        }

        // --- DOM RENDERING ---
        function renderTreeData(data) {
            allFlatFiles = [];
            const fragment = document.createDocumentFragment();
            buildTree(data, fragment);
            treeContainer.innerHTML = '';
            treeContainer.appendChild(fragment);
            if(searchBar.value.trim() !== '') triggerSearch(searchBar.value);
        }

        function loadFile(fileId, element) {
            document.querySelectorAll('.item-row').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            
            activeFileId = fileId;
            downloadBtn.style.display = 'flex';
            placeholder.style.display = 'none'; // Hide welcome screen

            // INSTANT LOAD: Remove all delays, let Google Drive handle the loading UI
            fileViewer.style.display = 'block';
            fileViewer.src = `https://drive.google.com/file/d/${fileId}/preview`;
            currentZoom = 100; applyZoom(); // Reset Zoom for new file
            
            if (window.innerWidth < 768) { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
        }

        function buildTree(data, container) {
            const ul = document.createElement('ul');
            data.forEach(item => {
                if (item.type === 'folder') {
                    const folderRow = document.createElement('div'); folderRow.className = 'item-row folder-row';
                    folderRow.innerHTML = `<span class="arrow">▶</span><span class="icon">📁</span>${item.name}`;
                    const childrenContainer = document.createElement('div'); childrenContainer.className = 'folder-group';
                    buildTree(item.children, childrenContainer); 
                    folderRow.onclick = () => { folderRow.classList.toggle('open'); childrenContainer.classList.toggle('open'); };
                    ul.appendChild(folderRow); ul.appendChild(childrenContainer);
                } else {
                    const fileRow = document.createElement('div'); fileRow.className = 'item-row';
                    fileRow.innerHTML = `<span class="arrow"></span><span class="icon">${getIcon(item.mimeType)}</span>${item.name}`;
                    fileRow.onclick = () => loadFile(item.id, fileRow);
                    ul.appendChild(fileRow); allFlatFiles.push(item);
                }
            });
            container.appendChild(ul);
        }

        // --- SYNC LOGIC ---
        function initializeApp() {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                fullTreeData = JSON.parse(cached);
                renderTreeData(fullTreeData);
            } else {
                skeletonLoader.style.display = 'block'; 
            }

            setTimeout(async () => {
                syncIndicator.classList.add('active'); 
                try {
                    const response = await fetch(SCRIPT_URL);
                    const newData = await response.json();
                    
                    if (JSON.stringify(newData) !== cached) {
                        fullTreeData = newData;
                        localStorage.setItem(CACHE_KEY, JSON.stringify(newData));
                        renderTreeData(fullTreeData); 
                    }
                } catch (error) { console.warn("Background sync failed."); } 
                finally { skeletonLoader.style.display = 'none'; syncIndicator.classList.remove('active'); }
            }, 100);
        }

        function triggerSearch(term) {
            term = term.toLowerCase().trim();
            if (term === '') { treeContainer.style.display = 'block'; searchResults.style.display = 'none'; return; } 
            
            treeContainer.style.display = 'none'; searchResults.style.display = 'block'; searchResults.innerHTML = '';
            const matches = allFlatFiles.filter(f => f.name.toLowerCase().includes(term));
            
            if (matches.length === 0) { searchResults.innerHTML = '<div style="padding:15px; color:var(--text-muted); text-align:center;">No files found.</div>'; return; }
            
            const frag = document.createDocumentFragment();
            matches.forEach(file => {
                const row = document.createElement('div'); row.className = 'item-row';
                row.innerHTML = `<span class="icon">${getIcon(file.mimeType)}</span>${file.name}`;
                row.onclick = () => loadFile(file.id, row);
                frag.appendChild(row);
            });
            searchResults.appendChild(frag);
        }

        searchBar.addEventListener('input', (e) => triggerSearch(e.target.value));

        // --- UPLOAD MODAL LOGIC ---
        const uploadModal = document.getElementById('upload-modal');
        const loadingOverlay = document.getElementById('loading-overlay');
        document.getElementById('upload-btn').addEventListener('click', () => { folderNavigationPath = [{ id: ROOT_FOLDER_ID, name: "Home", children: fullTreeData }]; renderModal(); uploadModal.classList.add('active'); });
        document.getElementById('cancel-upload-btn').addEventListener('click', () => uploadModal.classList.remove('active'));

        function renderModal() {
            const currentFolder = folderNavigationPath[folderNavigationPath.length - 1];
            document.getElementById('modal-breadcrumb').innerHTML = '';
            folderNavigationPath.forEach((node, index) => {
                const span = document.createElement('span'); span.textContent = node.name;
                span.onclick = () => { folderNavigationPath = folderNavigationPath.slice(0, index + 1); renderModal(); };
                document.getElementById('modal-breadcrumb').appendChild(span);
                if (index < folderNavigationPath.length - 1) document.getElementById('modal-breadcrumb').appendChild(document.createTextNode(' / '));
            });
            const list = document.getElementById('modal-folder-list'); list.innerHTML = '';
            const subfolders = currentFolder.children.filter(item => item.type === 'folder');
            if (subfolders.length === 0) list.innerHTML = '<div style="color:var(--text-muted); text-align:center; margin-top:20px;">No subfolders here.</div>';
            else subfolders.forEach(folder => {
                const div = document.createElement('div'); div.className = 'modal-folder'; div.innerHTML = `📁 ${folder.name}`;
                div.onclick = () => { folderNavigationPath.push(folder); renderModal(); }; list.appendChild(div);
            });
        }

        document.getElementById('create-folder-btn').addEventListener('click', async () => {
            const fn = document.getElementById('new-folder-name').value.trim(); if (!fn) return;
            uploadModal.classList.remove('active'); loadingOverlay.classList.add('active'); document.getElementById('loading-status').textContent = "Creating folder...";
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "createFolder", folderName: fn, parentId: folderNavigationPath[folderNavigationPath.length - 1].id }) });
                document.getElementById('new-folder-name').value = "";
                localStorage.removeItem(CACHE_KEY); initializeApp();
            } catch(e){} finally { loadingOverlay.classList.remove('active'); }
        });

        document.getElementById('confirm-upload-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            uploadModal.classList.remove('active'); loadingOverlay.classList.add('active'); document.getElementById('loading-status').textContent = "Reading file...";
            const reader = new FileReader();
            reader.onload = async function(event) {
                document.getElementById('loading-status').textContent = "Uploading to Drive...";
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "upload", parentId: folderNavigationPath[folderNavigationPath.length - 1].id, filename: file.name, mimeType: file.type || 'application/octet-stream', base64: event.target.result.split(',')[1] }) });
                    localStorage.removeItem(CACHE_KEY); initializeApp();
                } catch(e){} finally { loadingOverlay.classList.remove('active'); document.getElementById('file-input').value = ""; }
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('menu-btn').addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('active'); });
        overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });
        document.getElementById('fullscreen-btn').addEventListener('click', () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); });

        initializeApp();
    </script>
</body>
</html>
